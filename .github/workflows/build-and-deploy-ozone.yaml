name: Build & Deploy Ozone

on:
  push:
    branches:
      - develop
      - main
    tags:
      - 'v*'
    paths:
      - 'packages/ozone/**'
      - 'packages/api/**'
      - 'packages/aws/**'
      - 'packages/common/**'
      - 'packages/common-web/**'
      - 'packages/crypto/**'
      - 'packages/did/**'
      - 'packages/identity/**'
      - 'packages/lexicon/**'
      - 'packages/lexicon-resolver/**'
      - 'packages/syntax/**'
      - 'packages/ws-client/**'
      - 'packages/xrpc/**'
      - 'packages/xrpc-server/**'
      - 'services/ozone/**'
      - 'lexicons/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: false
        default: 'dev'
        type: choice
        options:
          - dev
          - stage
          - prod

env:
  REGISTRY: ghcr.io
  OZONE_IMAGE: ghcr.io/w-social-eu/w-social-atproto/ozone

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Determine environment
        id: config
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            ENV="${{ github.event.inputs.environment }}"
          elif [[ "${{ github.ref_type }}" == "tag" && "${{ github.ref_name }}" == v* ]]; then
            ENV="prod"
          elif [[ "${{ github.ref_name }}" == "main" ]]; then
            ENV="stage"
          elif [[ "${{ github.ref_name }}" == "develop" || "${{ github.ref_name }}" == feature/* ]]; then
            ENV="dev"
          else
            ENV="dev"
          fi
          SHORT_SHA="${GITHUB_SHA::7}"
          IMAGE_TAG="custom-${ENV}-${SHORT_SHA}"
          echo "environment=$ENV" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

          # Map env to kubeconfig secret name
          case "$ENV" in
            dev)   echo "kubeconfig_secret=KUBECONFIG_DEV" >> $GITHUB_OUTPUT ;;
            stage) echo "kubeconfig_secret=KUBECONFIG_STAGE" >> $GITHUB_OUTPUT ;;
            prod)  echo "kubeconfig_secret=KUBECONFIG_PROD" >> $GITHUB_OUTPUT ;;
          esac

      # --- Build Ozone Docker image ---

      - name: Checkout atproto
        uses: actions/checkout@v4

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./services/ozone/Dockerfile
          push: true
          tags: |
            ${{ env.OZONE_IMAGE }}:${{ steps.config.outputs.image_tag }}
            ${{ env.OZONE_IMAGE }}:${{ steps.config.outputs.environment }}-latest
            ${{ github.ref_type == 'tag' && format('{0}:{1}', env.OZONE_IMAGE, github.ref_name) || '' }}
          no-cache: true

      # --- Deploy to K8s via Helm ---

      - name: Checkout infrastructure
        uses: actions/checkout@v4
        with:
          repository: w-social-eu/w-social-infrastructure
          token: ${{ secrets.PAT_TOKEN }}
          path: infrastructure

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Setup kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets[steps.config.outputs.kubeconfig_secret] }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy Ozone
        run: |
          ENV="${{ steps.config.outputs.environment }}"
          TAG="${{ steps.config.outputs.image_tag }}"
          CHART="infrastructure/fleet/bundles/ozone"

          helm upgrade --install ozone "$CHART" \
            -f "$CHART/values.yaml" \
            -f "$CHART/values-${ENV}.yaml" \
            --set image.tag="${TAG}" \
            -n ozone \
            --wait --timeout 5m

      # --- Summary ---

      - name: Summary
        if: always()
        run: |
          echo "## Ozone Build & Deploy" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | **${{ steps.config.outputs.environment }}** |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ steps.config.outputs.short_sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker image | \`${{ env.OZONE_IMAGE }}:${{ steps.config.outputs.image_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy | \`helm upgrade\` to \`${{ steps.config.outputs.environment }}\` cluster |" >> $GITHUB_STEP_SUMMARY
